# Compose-Spec – kein "version:"-Key
#
# Aktuell: lokaler Build (build: ./backend / build: ./web)
# Ab v1.0.0: image:-Zeilen einkommentieren, build:-Zeilen auskommentieren
# und Images vorher via SSH pullen:
#   docker pull ghcr.io/OWNER/pokecollect-api:1.0.0
#   docker pull ghcr.io/OWNER/pokecollect-web:1.0.0

services:
  api:
    build: ./backend
    # image: ghcr.io/OWNER/pokecollect-api:1.0.0
    user: "3010:3010"
    ports:
      - "3010:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CARDMARKET_APP_TOKEN=${CARDMARKET_APP_TOKEN}
      - CARDMARKET_APP_SECRET=${CARDMARKET_APP_SECRET}
      - CARDMARKET_ACCESS_TOKEN=${CARDMARKET_ACCESS_TOKEN}
      - CARDMARKET_ACCESS_SECRET=${CARDMARKET_ACCESS_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - APP_USERNAME=${APP_USERNAME:-admin}
      - APP_PASSWORD_HASH=${APP_PASSWORD_HASH}
      # Kommagetrennte Browser-Origins; leer = localhost-Defaults (config.py).
      # Prod setzt in der .env: CORS_ORIGINS=http://<server-ip>:3011
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - /mnt/HDDs/Applications/pokecollect/images:/app/images
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pokecollect
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3010}
    # image: ghcr.io/OWNER/pokecollect-web:1.0.0
    user: "3010:3010"
    ports:
      - "3011:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3010}
    depends_on:
      - api
    networks:
      - pokecollect
    restart: unless-stopped

  db:
    image: postgres:16.3-alpine
    user: "3010:3010"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      # pgdata/ Unterordner nötig weil ZFS-Mount-Root .zfs-Einträge enthält
      - /mnt/HDDs/Applications/pokecollect/db/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pokecollect
    restart: unless-stopped

  # ── Optional: HTTPS im LAN via Caddy mit tls internal (Issue #18) ─────────
  # NUR aktivieren, wenn KEIN eigener Caddy läuft — läuft bereits einer
  # (bevorzugter Weg), stattdessen deploy/caddy/Caddyfile.snippet dort
  # einbinden. Beide Wege Schritt für Schritt: deploy/README.md →
  # "HTTPS im LAN (tls internal)".
  # Vor dem Aktivieren im Snippet die In-Stack-Upstreams einkommentieren
  # (api:8000 / web:3000) und NEXT_PUBLIC_API_URL=https://pokecollect.lan
  # setzen + Web-Image neu bauen (Build-Arg!).
  # caddy:
  #   image: caddy:2-alpine
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./deploy/caddy/Caddyfile.snippet:/etc/caddy/Caddyfile:ro
  #     # /data persistiert die Caddy-CA — ohne dieses Volume erzeugt jeder
  #     # Neustart eine NEUE CA und das am Handy installierte Zertifikat
  #     # wird ungültig!
  #     - /mnt/HDDs/Applications/pokecollect/caddy/data:/data
  #     - /mnt/HDDs/Applications/pokecollect/caddy/config:/config
  #   depends_on:
  #     - api
  #     - web
  #   networks:
  #     - pokecollect
  #   restart: unless-stopped

networks:
  pokecollect:
    driver: bridge
