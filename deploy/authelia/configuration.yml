---
theme: dark

jwt_secret: "ERSETZEN_DURCH_ZUFALLS_STRING_MIN_64_ZEICHEN"

default_redirection_url: https://pokecollect.yourdomain.com

server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

totp:
  issuer: yourdomain.com

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: bcrypt
      iterations: 12

access_control:
  default_policy: deny
  rules:
    # PokéCollect Web + API — nur nach Login erreichbar
    - domain:
        - "pokecollect.yourdomain.com"
      policy: one_factor

session:
  name: authelia_session
  secret: "ERSETZEN_DURCH_ZUFALLS_STRING_MIN_64_ZEICHEN"
  expiration: 12h
  inactivity: 2h
  domain: yourdomain.com
  cookie:
    - domain: yourdomain.com
      authelia_url: https://auth.yourdomain.com
      default_redirection_url: https://pokecollect.yourdomain.com

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 10m

storage:
  local:
    path: /config/db.sqlite3

notifier:
  disable_startup_check: true
  filesystem:
    filename: /config/notifications.txt
